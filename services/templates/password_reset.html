<!doctype html>
<html lang="en">
  <head></head>
  <body>
    <p>Hello, {{ username }}!</p>
    <p>
      You have requested a password reset. Please follow the link below, to set
      a new password:
    </p>
    <a href="{{ host }}auth/reset_password?token={{ token }}">Скинути пароль</a>
    <p>
      This link is valid for 1 hour. If you didn't request a reset, just ignore
      this email.
    </p>
  </body>
</html>
