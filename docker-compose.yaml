services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # Команда pg_isready перевіряє, чи приймає база з'єднання
      test:
        [
          "CMD",
          "pg_isready",
          "-U",
          "vlad",
          "-d",
          "contacts_db",
          "-h",
          "localhost",
          "-p",
          "5432",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  redis:
    image: redis:latest
    ports:
      - "6379:6379"

volumes:
  postgres_data:
